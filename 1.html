<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Блокируем любые отступы и системные жесты */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Метод 300vh: создаем сверхвысокий контейнер, чтобы "утопить" карту в безопасной зоне */
        html, body {
            margin: 0; padding: 0; 
            width: 100vw; 
            height: 300vh; 
            background-color: #f2f2f2; 
            overflow: hidden;
            position: absolute; 
            top: 0; 
            left: 0;
            overscroll-behavior: none;
        }

        /* Карта занимает все 300vh, но мы показываем только среднюю часть (через top: -100vh) */
        #map { 
            position: absolute; 
            width: 100vw; 
            height: 300vh; 
            top: -100vh; 
            left: 0; 
            z-index: 1; 
        }

        /* Черно-белый стиль */
        .leaflet-tile-pane { filter: grayscale(1) contrast(1.1); }

        /* Кастомный попап */
        .leaflet-popup-content-wrapper {
            background: #fff; color: #000; border-radius: 4px; border: 2px solid #000;
            max-height: 250px; overflow-y: auto; box-shadow: none;
        }
        .leaflet-popup-content { margin: 12px; width: 240px !important; }
        
        .msg-item { padding: 8px 0; border-bottom: 1px solid #eee; }
        .msg-item:last-child { border-bottom: none; }
        .msg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
        .msg-time { font-size: 10px; color: #888; font-weight: bold; font-family: monospace; }
        .msg-status-dot { width: 10px; height: 10px; border: 1.5px solid #000; }
        .msg-body { font-size: 13px; font-weight: 700; line-height: 1.3; color: #000; }

        /* Верхняя панель */
        .weather-panel {
            position: fixed; 
            top: env(safe-area-inset-top, 40px); 
            left: 20px; 
            z-index: 9999;
            background: #fff; 
            padding: 10px 14px; 
            border-radius: 8px; 
            border: 2.5px solid #000; 
            pointer-events: none;
        }
        .status-row { display: flex; align-items: center; margin-bottom: 4px; font-weight: 900; font-size: 12px; text-transform: uppercase; }
        .indicator { width: 12px; height: 12px; margin-right: 8px; border: 1px solid #000; }
        .c-red { background: #ff4d00; } 
        .c-green { background: #00ff41; }
        #update-time { font-size: 10px; color: #666; font-family: monospace; font-weight: bold; }
        
        /* Скрываем всё лишнее */
        .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-top.leaflet-left { display: none !important; }
    </style>
</head>
<body>
<div id="map"></div>
<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ОБНОВЛЕНИЕ...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    let allWeatherPoints = [];
    
    // Инициализация с Canvas
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false, 
        renderer: L.canvas(),
        tap: false // Отключаем Leaflet tap для лучшей работы на мобильных
    }).setView([50.4501, 30.5234], 11);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const weatherGroup = L.layerGroup().addTo(map);

    function drawLaser(ctx, p, r, color) {
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
        g.addColorStop(0, color); 
        g.addColorStop(0.05, color);
        g.addColorStop(0.15, color.replace('1)', '0.6)')); 
        g.addColorStop(0.3, color.replace('1)', '0.2)'));
        g.addColorStop(0.6, color.replace('1)', '0.05)')); 
        g.addColorStop(1, color.replace('1)', '0)'));
        ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.fillStyle = g; ctx.fill();
    }

    async function update() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`, {cache:"no-store"});
            const csv = await res.text();
            weatherGroup.clearLayers(); 
            allWeatherPoints = [];
            const rows = csv.split('\n').slice(1);
            
            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s=>s.replace(/"/g,'').trim());
                if (c.length >= 6) {
                    const p = { 
                        time: c[0], 
                        status: c[2].toLowerCase(), 
                        lat: parseFloat(c[3]), 
                        lng: parseFloat(c[4]), 
                        msg: c[5] || '...' 
                    };
                    if (!isNaN(p.lat) && !isNaN(p.lng)) {
                        allWeatherPoints.push(p);
                        const col = p.status.includes('red') ? 'rgba(255, 77, 0, 1)' : 'rgba(0, 255, 65, 1)';
                        const circle = L.circle([p.lat, p.lng], { radius: 550, stroke: false, fill: false, interactive: false }).addTo(weatherGroup);
                        circle._updatePath = function() { 
                            if(this._point && this._radius) drawLaser(this._renderer._ctx, this._point, this._radius, col); 
                        };
                    }
                }
            });
            document.getElementById('update-time').innerText = "UPD: " + new Date().toLocaleTimeString();
        } catch(e) { document.getElementById('update-time').innerText = "ОШИБКА"; }
    }

    map.on('click', e => {
        const nearby = allWeatherPoints.filter(p => map.distance(e.latlng, L.latLng(p.lat, p.lng)) <= 500).reverse();
        if (nearby.length > 0) {
            let html = '<div class="popup-wrapper">';
            nearby.forEach(p => {
                const clr = p.status.includes('red') ? '#ff4d00' : '#00ff41';
                const displayTime = p.time.includes(' ') ? p.time.split(' ')[1] : p.time;
                html += `
                    <div class="msg-item">
                        <div class="msg-header">
                            <span class="msg-time">${displayTime}</span>
                            <div class="msg-status-dot" style="background:${clr}"></div>
                        </div>
                        <div class="msg-body">${p.msg}</div>
                    </div>`;
            });
            html += '</div>';
            L.popup({ closeButton: false, offset: L.point(0, -5), maxWidth: 260 }).setLatLng(e.latlng).setContent(html).openOn(map);
        }
    });

    update(); 
    setInterval(update, 30000);
    document.addEventListener("visibilitychange", () => { if(document.visibilityState==='visible') update(); });
</script>
</body>
</html>
