<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE - Laser Mode</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Полный сброс всех отступов браузера */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            /* Используем dvh для динамического подбора высоты без полос */
            height: 100dvh; 
            background-color: #000;
            overflow: hidden;
            position: fixed;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100dvh;
            z-index: 1;
        }

        /* Убираем любые серые фоны под картой */
        .leaflet-container {
            background: #000 !important;
        }

        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.1);
        }

        /* Компактная панель */
        .weather-panel {
            position: fixed; 
            top: env(safe-area-inset-top, 10px);
            left: env(safe-area-inset-left, 10px);
            z-index: 9999;
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #000;
            pointer-events: none;
            backdrop-filter: blur(5px);
            font-family: -apple-system, system-ui, sans-serif;
        }

        .status-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 2px; 
            font-weight: 800; 
            font-size: 10px; 
            color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 10px; 
            height: 10px; 
            margin-right: 6px; 
            border: 1px solid #000;
        }
        
        .c-red { background: #ff0000; } 
        .c-green { background: #00ff00; }
        
        #update-time { 
            font-size: 8px; 
            color: #333; 
            font-family: monospace;
        }

        /* Скрываем всё лишнее программно */
        .leaflet-control-container { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">SYNC...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    // Инициализация карты
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        renderer: L.canvas(),
        // Убираем инерцию и лишние зазоры при перетаскивании
        bounceAtZoomLimits: false
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    function drawLaser(ctx, point, radius, color) {
        const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, radius);
        gradient.addColorStop(0, color);
        gradient.addColorStop(0.1, color);
        gradient.addColorStop(0.3, hexToRgba(color, 0.4));
        gradient.addColorStop(0.6, hexToRgba(color, 0.1));
        gradient.addColorStop(1, "transparent");

        ctx.beginPath();
        ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3].replace(',', '.'));
                    const lng = parseFloat(cols[4].replace(',', '.'));

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const laserColor = (status === 'red' || status === 'осадки') ? '#ff0000' : '#00ff00';
                        
                        const circle = L.circle([lat, lng], {
                            radius: 500,
                            stroke: false,
                            fill: false,
                            interactive: false
                        }).addTo(weatherGroup);

                        circle._updatePath = function() {
                            const renderer = this._renderer;
                            const ctx = renderer._ctx;
                            if (ctx && this._point) {
                                drawLaser(ctx, this._point, this._radius, laserColor);
                            }
                        };
                    }
                }
            });
            document.getElementById('update-time').innerText = "LAST UPDATE: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('update-time').innerText = "OFFLINE";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);

    // Исправление бага "серых полос" при ресайзе
    window.addEventListener('resize', () => {
        document.body.style.height = window.innerHeight + 'px';
        map.invalidateSize();
    });
</script>

</body>
</html>
