<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Сброс всех отступов */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
        }

        /* Карта ровно на весь экран без смещений */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Обычный вид карты без фильтров (цветной или ЧБ - на ваш выбор, здесь ЧБ для стиля) */
        .leaflet-tile-pane { filter: grayscale(1); }

        /* Стиль попапа при клике */
        .leaflet-popup-content-wrapper {
            background: #fff;
            color: #000;
            border-radius: 2px;
            border: 1px solid #000;
            box-shadow: 2px 2px 0px #000;
        }
        .msg-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }
        .msg-item:last-child { border-bottom: none; }
        .msg-time { font-size: 10px; color: #666; font-weight: bold; }
        .msg-body { font-size: 13px; margin-top: 2px; }

        /* Скрываем стандартные кнопки зума для чистоты */
        .leaflet-control-zoom { display: none; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    let allWeatherPoints = [];
    
    // Инициализация стандартной карты
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        renderer: L.canvas() 
    }).setView([50.4501, 30.5234], 11);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const weatherGroup = L.layerGroup().addTo(map);

    // Рисуем обычную точку (без размытия, четкий круг)
    function drawPoint(ctx, p, r, color) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, r / 2, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "white";
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    async function update() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`, {cache:"no-store"});
            const csv = await res.text();
            weatherGroup.clearLayers(); 
            allWeatherPoints = [];
            
            const rows = csv.split('\n').slice(1);
            rows.forEach(row => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s=>s.replace(/"/g,'').trim());
                if (c.length >= 6) {
                    const p = { 
                        time: c[0], 
                        status: c[2].toLowerCase(), 
                        lat: parseFloat(c[3]), 
                        lng: parseFloat(c[4]), 
                        msg: c[5] || '...' 
                    };
                    if (!isNaN(p.lat) && !isNaN(p.lng)) {
                        allWeatherPoints.push(p);
                        const col = p.status.includes('red') ? '#ff4d00' : '#00ff41';
                        
                        const circle = L.circle([p.lat, p.lng], { radius: 300, interactive: false }).addTo(weatherGroup);
                        circle._updatePath = function() { 
                            if(this._point && this._radius) drawPoint(this._renderer._ctx, this._point, this._radius, col); 
                        };
                    }
                }
            });
        } catch(e) { console.error("Ошибка обновления"); }
    }

    // Группировка клика
    map.on('click', e => {
        const nearby = allWeatherPoints.filter(p => map.distance(e.latlng, L.latLng(p.lat, p.lng)) <= 500).reverse();
        if (nearby.length > 0) {
            let html = '';
            nearby.forEach(p => {
                const time = p.time.includes(' ') ? p.time.split(' ')[1] : p.time;
                html += `<div class="msg-item"><div class="msg-time">${time}</div><div class="msg-body">${p.msg}</div></div>`;
            });
            L.popup({ maxWidth: 250 }).setLatLng(e.latlng).setContent(html).openOn(map);
        }
    });

    update(); 
    setInterval(update, 30000);
</script>
</body>
</html>
