<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Полный сброс без лишних украшательств */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 300vh; 
            background-color: #f2f2f2;
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* КАРТА: Огромный слой 300% высоты для борьбы с полосами */
        #map {
            position: absolute;
            width: 100vw; 
            height: 300vh; 
            top: -100vh;   
            left: 0;
            z-index: 1;
        }

        /* Простой ЧБ стиль */
        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.1);
        }

        /* МАКСИМАЛЬНО ПРОСТАЯ ПЛАШКА (БЕЗ РАЗМЫТИЯ) */
        .weather-panel {
            position: fixed; 
            top: env(safe-area-inset-top, 40px);
            left: 20px;
            z-index: 9999;
            background: #ffffff; /* Чистый белый без прозрачности */
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid #000000; /* Четкая черная рамка */
            pointer-events: none;
        }

        .status-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 4px; 
            font-weight: 900; 
            font-size: 12px; 
            color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 12px; 
            height: 12px; 
            margin-right: 8px; 
            border: 1px solid #000; /* Контур для индикаторов */
        }
        
        .c-red { background: #ff0000; } 
        .c-green { background: #00ff00; }
        
        #update-time { 
            font-size: 9px; 
            color: #666; 
            font-family: monospace;
            font-weight: bold;
        }

        /* Убираем мусор */
        .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-top.leaflet-left { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ОБНОВЛЕНИЕ...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        zoomAnimation: false, // Отключил анимацию для простоты
        fadeAnimation: false,
        tap: true 
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3]);
                    const lng = parseFloat(cols[4]);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const color = status === 'red' ? '#ff0000' : '#00ff00';
                        L.circleMarker([lat, lng], {
                            radius: 18, 
                            fillColor: color,
                            fillOpacity: 0.6,
                            color: '#000',
                            weight: 1,
                            opacity: 1
                        }).addTo(weatherGroup);
                    }
                }
            });
            document.getElementById('update-time').innerText = "UPD: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('update-time').innerText = "DATA ERROR";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);
</script>

</body>
</html>
