<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f2f2f2; 
            position: fixed;
            touch-action: none; /* Запрет системных жестов браузера */
        }

        /* КАРТА В 3 РАЗА БОЛЬШЕ ЭКРАНА (300% высоты и 120% ширины для запаса) */
        #map {
            width: 120%;
            height: 300vh; 
            position: absolute;
            /* Сдвигаем на 10% влево и на 100% вверх, чтобы центр был в зоне видимости */
            top: -100vh; 
            left: -10%;
            z-index: 1;
            
            /* Аппаратное ускорение (GPU) для плавности */
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        /* Стиль Toner Lite */
        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.1) brightness(1.03);
        }

        /* Плашка управления (iOS стиль) */
        .weather-panel {
            position: fixed;
            top: env(safe-area-inset-top, 40px);
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 18px;
            border-radius: 14px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        .status-row { 
            display: flex; align-items: center; 
            margin-bottom: 5px; font-weight: 800; 
            font-size: 12px; color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 12px; height: 12px; margin-right: 10px; 
            border-radius: 3px;
        }
        
        .c-red { background: rgba(255, 59, 48, 0.7); } 
        .c-green { background: rgba(52, 199, 89, 0.7); }
        
        #update-time { 
            font-size: 9px; color: rgba(0,0,0,0.5); 
            font-family: monospace;
        }

        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ЗАГРУЗКА...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    // Инициализация
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        zoomAnimation: true,
        markerZoomAnimation: true,
        inertia: true,
        tap: true 
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3]);
                    const lng = parseFloat(cols[4]);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const color = status === 'red' ? '#ff3b30' : '#34c759';
                        L.circleMarker([lat, lng], {
                            radius: 22, 
                            fillColor: color,
                            fillOpacity: 0.45,
                            color: color,
                            weight: 1.5,
                            opacity: 0.6
                        }).addTo(weatherGroup);
                    }
                }
            });
            document.getElementById('update-time').innerText = "ОБНОВЛЕНО: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('update-time').innerText = "ОШИБКА ДАННЫХ";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);
</script>

</body>
</html>
