<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Убираем прокрутку и фиксируем фон */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #f4f1ed;
            position: fixed;
        }

        /* КАРТА БОЛЬШЕ ЭКРАНА: 120% высоты с вылетом вверх на 10% */
        #map {
            width: 100%;
            height: 120vh; 
            position: absolute;
            top: -10vh; 
            left: 0;
            z-index: 1;
        }

        /* Стиль карты */
        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.2) brightness(1.05);
        }

        /* Панель индикаторов */
        .weather-panel {
            position: absolute;
            top: env(safe-area-inset-top, 30px);
            left: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px 15px;
            border-radius: 12px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            pointer-events: none;
        }

        .status-row { 
            display: flex; align-items: center; 
            margin-bottom: 4px; font-weight: 700; 
            font-size: 11px; color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 12px; height: 12px; margin-right: 8px; 
            border-radius: 3px;
        }
        
        .c-red { background: rgba(255, 59, 48, 0.6); } 
        .c-green { background: rgba(52, 199, 89, 0.6); }
        
        #update-time { 
            font-size: 8px; color: rgba(0,0,0,0.5); 
            font-family: monospace;
        }

        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ОБНОВЛЕНИЕ...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        tap: true 
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3]);
                    const lng = parseFloat(cols[4]);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const color = status === 'red' ? '#ff3b30' : '#34c759';
                        L.circleMarker([lat, lng], {
                            radius: 18,
                            fillColor: color,
                            fillOpacity: 0.45,
                            color: color,
                            weight: 1.5,
                            opacity: 0.6
                        }).addTo(weatherGroup);
                    }
                }
            });
            document.getElementById('update-time').innerText = "UPD: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('update-time').innerText = "ERROR";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);
</script>

</body>
</html>
