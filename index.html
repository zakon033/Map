<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Убираем любые ограничения бокса */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f2f2f2;
            position: fixed;
            -webkit-tap-highlight-color: transparent;
        }

        /* КАРТА КАК СВОБОДНЫЙ ХОЛСТ (300% ВЫСОТЫ) */
        #map {
            position: absolute;
            width: 150vw; /* Шире экрана на 50% */
            height: 300vh; /* В 3 раза выше экрана */
            
            /* Центрируем этот гигантский холст относительно окна */
            top: -100vh; 
            left: -25vw;
            
            z-index: 1;
            
            /* Аппаратный рендеринг без привязки к потоку документа */
            transform: translate3d(0,0,0);
            -webkit-transform: translate3d(0,0,0);
        }

        /* Фильтр для эффекта Toner Lite */
        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.1) brightness(1.03);
        }

        /* Плашка - фиксируем её поверх всего */
        .weather-panel {
            position: fixed;
            top: env(safe-area-inset-top, 44px);
            left: 20px;
            z-index: 9999;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 10px 16px;
            border-radius: 12px;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            pointer-events: none;
        }

        .status-row { 
            display: flex; align-items: center; 
            margin-bottom: 4px; font-weight: 800; 
            font-size: 11px; color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 10px; height: 10px; margin-right: 8px; 
            border-radius: 2px;
        }
        
        .c-red { background: rgba(255, 59, 48, 0.7); } 
        .c-green { background: rgba(52, 199, 89, 0.7); }
        
        #update-time { 
            font-size: 8px; color: rgba(0,0,0,0.5); 
            font-family: monospace;
        }

        /* Скрываем всё сервисное */
        .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-top.leaflet-left { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ЗАГРУЗКА...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    // Инициализация гигантского холста
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        zoomAnimation: true,
        fadeAnimation: true,
        markerZoomAnimation: true,
        tap: true 
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3]);
                    const lng = parseFloat(cols[4]);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const color = status === 'red' ? '#ff3b30' : '#34c759';
                        L.circleMarker([lat, lng], {
                            radius: 20, 
                            fillColor: color,
                            fillOpacity: 0.45,
                            color: color,
                            weight: 1,
                            opacity: 0.6
                        }).addTo(weatherGroup);
                    }
                }
            });
            document.getElementById('update-time').innerText = "UPD: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('update-time').innerText = "ERROR";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);
</script>

</body>
</html>
