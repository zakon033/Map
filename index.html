<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Киев Погода LIVE - Laser Mode</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh; 
            background-color: #f2f2f2;
            overflow: hidden;
        }

        #map {
            width: 100vw; 
            height: 100vh;
            z-index: 1;
        }

        /* Твой базовый ЧБ стиль */
        .leaflet-tile-pane {
            filter: grayscale(1) contrast(1.1);
        }

        .weather-panel {
            position: fixed; 
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 9999;
            background: #ffffff;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid #000000;
            pointer-events: none;
        }

        .status-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 4px; 
            font-weight: 900; 
            font-size: 11px; 
            color: #000;
            text-transform: uppercase;
        }
        
        .indicator { 
            width: 12px; 
            height: 12px; 
            margin-right: 8px; 
            border: 1px solid #000;
        }
        
        .c-red { background: #ff0000; } 
        .c-green { background: #00ff00; }
        
        #update-time { 
            font-size: 9px; 
            color: #666; 
            font-family: monospace;
            font-weight: bold;
        }

        .leaflet-control-zoom, .leaflet-control-attribution, .leaflet-top.leaflet-left { 
            display: none !important; 
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="weather-panel">
    <div class="status-row"><div class="indicator c-red"></div> ОСАДКИ</div>
    <div class="status-row"><div class="indicator c-green"></div> ЯСНО</div>
    <span id="update-time">ОБНОВЛЕНИЕ...</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const SPREADSHEET_ID = '19vZJiUgwizqrwbxrZTG5jSe1Czh7af6ApsL2VLQYSwo';
    
    // Используем Canvas рендерер для плавных градиентов
    const map = L.map('map', { 
        zoomControl: false, 
        attributionControl: false,
        renderer: L.canvas()
    }).setView([50.4501, 30.5234], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const weatherGroup = L.layerGroup().addTo(map);

    // Функция отрисовки лазерного пятна через Canvas
    function drawLaser(ctx, point, radius, color) {
        const gradient = ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, radius);
        
        // Экспоненциальное затухание: 
        // 0-5% ядовитое ядро, затем резкий уход в прозрачность
        gradient.addColorStop(0, color);
        gradient.addColorStop(0.05, color);
        gradient.addColorStop(0.15, hexToRgba(color, 0.6));
        gradient.addColorStop(0.3, hexToRgba(color, 0.2));
        gradient.addColorStop(0.6, hexToRgba(color, 0.05));
        gradient.addColorStop(1, hexToRgba(color, 0));

        ctx.beginPath();
        ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    async function updateWeather() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0&v=${Date.now()}`;
            const response = await fetch(url);
            const csvText = await response.text();
            
            weatherGroup.clearLayers();
            const rows = csvText.split('\n').slice(1);
            
            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                if (cols.length >= 5) {
                    const status = cols[2]?.toLowerCase();
                    const lat = parseFloat(cols[3]);
                    const lng = parseFloat(cols[4]);

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const laserColor = status === 'red' ? '#ff0000' : '#00ff00';
                        
                        // Создаем невидимый круг для управления событиями и масштабом
                        // Радиус 500 метров
                        const circle = L.circle([lat, lng], {
                            radius: 500,
                            stroke: false,
                            fill: false, // Мы будем рисовать сами через хук рендерера
                            interactive: false
                        }).addTo(weatherGroup);

                        // Переопределяем метод отрисовки для этого конкретного круга
                        circle._updatePath = function() {
                            const renderer = this._renderer;
                            const ctx = renderer._ctx;
                            const p = this._point;
                            const r = this._radius;

                            if (!p || !r) return;
                            
                            drawLaser(ctx, p, r, laserColor);
                        };
                    }
                }
            });
            document.getElementById('update-time').innerText = "UPD: " + new Date().toLocaleTimeString();
        } catch (e) {
            console.error(e);
            document.getElementById('update-time').innerText = "DATA ERROR";
        }
    }

    updateWeather();
    setInterval(updateWeather, 30000);
</script>

</body>
</html>
